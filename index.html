<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <img src="logo.png" alt="Logo" class="logo">
            <h1>Simulador de Crédito</h1>
        </div>

        <h2>Datos financieros</h2>

        <div class="form-grid">
            <div>
                <label for="txtIngresos">Ingresos</label>
                <input type="text" id="txtIngresos">
                <small class="error" id="errorIngresos"></small>
            </div>

            <div>
                <label for="txtEgresos">Egresos</label>
                <input type="text" id="txtEgresos">
                <small class="error" id="errorEgresos"></small>
            </div>
        </div>

        <div class="result-grid">
            <p>Disponible: <span id="spnDisponible"></span></p>
            <p>Capacidad: <span id="spnCapacidadPago"></span></p>
        </div>

        <h2>Solicitud de crédito</h2>

        <div class="form-grid">
            <div>
                <label for="txtMonto">Monto</label>
                <input type="text" id="txtMonto">
                <small class="error" id="errorMonto"></small>
            </div>

            <div>
                <label for="txtPlazo">Plazo (años)</label>
                <input type="text" id="txtPlazo">
                <small class="error" id="errorPlazo"></small>
            </div>

            <div>
                <label for="txtTasaInteres">Tasa (%)</label>
                <input type="text" id="txtTasaInteres">
                <small class="error" id="errorTasaInteres"></small>
            </div>
        </div>

        <div class="result-grid">
            <p>Interés: <span id="spnInteresPagar"></span></p>
            <p>Total: <span id="spnTotalPrestamo"></span></p>
            <p>Cuota: <span id="spnCuotaMensual"></span></p>
        </div>

        <p class="estado">Estado: <span id="spnEstadoCredito">ANALIZANDO...</span></p>

        <div class="buttons">
            <button id="btnCalcularCredito" onclick="calcular()">Calcular</button>
            <button id="btnReiniciar">Reiniciar</button>
        </div>

    </div>

    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</body>

</html>
